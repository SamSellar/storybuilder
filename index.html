<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Story Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fdf6ee;--card:#fff;--ink:#2d2013;--mu:#8a7560;--bd:#e8ddd0;--or:#f97316;--pu:#8b5cf6;--gr:#10b981;--selbg:#fff7ed}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
#app{max-width:720px;margin:0 auto;padding:1.75rem 1rem 4rem}
.top{text-align:center;margin-bottom:1.75rem}
h1{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--ink)}
h1 span{color:var(--or)}
.sub{color:var(--mu);font-size:.95rem;margin-top:.3rem}
.steps-row{display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;gap:0}
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--bd);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-weight:700;font-size:.8rem;color:var(--mu);flex-shrink:0;transition:all .3s}
.dot.active{background:var(--or);border-color:var(--or);color:#fff;transform:scale(1.15)}
.dot.done{background:var(--gr);border-color:var(--gr);color:#fff}
.dline{height:2px;width:24px;background:var(--bd);flex-shrink:0;transition:background .3s}
.dline.done{background:var(--gr)}
.sbar{background:var(--card);border:1.5px solid var(--bd);border-radius:12px;padding:.75rem 1.1rem;margin-bottom:1rem;display:none;flex-wrap:wrap;gap:6px}
.chip{background:var(--bg);border:1.5px solid var(--bd);border-radius:50px;padding:3px 11px;font-size:.8rem;font-weight:600;color:var(--mu)}
.chip b{color:var(--ink)}
.card{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:1.6rem;margin-bottom:1rem;animation:pop .38s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 10px rgba(0,0,0,.05)}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ey{font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--or);margin-bottom:.35rem}
.qu{font-family:'Baloo 2',cursive;font-size:1.35rem;font-weight:700;color:var(--ink);margin-bottom:1.1rem;line-height:1.3}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px}
.cbtn{background:var(--bg);border:2px solid var(--bd);border-radius:13px;padding:.85rem .6rem;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .18s;font-family:'Nunito',sans-serif}
.cbtn:hover{border-color:var(--or);transform:translateY(-2px);box-shadow:0 4px 12px rgba(249,115,22,.13)}
.cbtn.sel{background:var(--selbg);border-color:var(--or);box-shadow:0 0 0 3px rgba(249,115,22,.18);transform:translateY(-2px)}
.ce{font-size:1.9rem;line-height:1}
.cl{font-family:'Baloo 2',cursive;font-weight:700;font-size:.87rem;color:var(--ink);line-height:1.2}
.nbtn{display:block;width:100%;margin-top:.9rem;background:var(--or);color:#fff;border:none;border-radius:13px;padding:.9rem;font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(249,115,22,.32)}
.nbtn:hover{background:#ea6c0a;transform:translateY(-2px)}
.nbtn:disabled{background:#d1c4b8;box-shadow:none;cursor:not-allowed;transform:none}
.gscreen{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:1.4rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.gtop{text-align:center;margin-bottom:.8rem}
.gtitle{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;color:var(--ink)}
.gsub{color:var(--mu);font-size:.85rem;margin-top:.15rem}
.wdots::after{content:'';animation:wd 1.5s steps(4,end) infinite}
@keyframes wd{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
#gc{display:block;width:100%;border-radius:12px;border:2px solid var(--bd);cursor:pointer;touch-action:manipulation}
.gscores{display:flex;justify-content:space-between;margin-top:.4rem;font-family:'Baloo 2',cursive;font-size:.88rem;color:var(--mu)}
.gscores span{font-weight:700;color:var(--ink)}
.ready-banner{background:#f0fdf4;border:2px solid #86efac;border-radius:13px;padding:.9rem 1.1rem;text-align:center;margin-bottom:1rem;font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:700;color:#16a34a;display:none;animation:pop .4s ease}
.story-card{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:1.75rem;margin-bottom:1rem;box-shadow:0 2px 14px rgba(0,0,0,.06);animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
.sbadge{display:inline-block;background:#fff7ed;border:1.5px solid #fed7aa;color:var(--or);border-radius:50px;padding:3px 13px;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:.65rem}
.stitle{font-family:'Baloo 2',cursive;font-size:1.65rem;font-weight:800;color:var(--ink);line-height:1.2;margin-bottom:.2rem}
.sauthor{color:var(--mu);font-size:.88rem;margin-bottom:1rem}
.sdiv{border:none;border-top:1.5px solid var(--bd);margin:1rem 0}
.sbody{font-size:1.05rem;line-height:1.85;color:var(--ink)}
.sbody p{margin-bottom:.95rem}
.sbody p:last-child{margin-bottom:0}
.hi{font-weight:700;color:var(--pu)}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.5rem}
.abtn{border:2px solid var(--bd);border-radius:13px;padding:.78rem;font-family:'Baloo 2',cursive;font-size:.98rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.abtn.p{background:var(--pu);border-color:var(--pu);color:#fff;box-shadow:0 4px 14px rgba(139,92,246,.28)}
.abtn.p:hover{background:#7c3aed;transform:translateY(-2px)}
.abtn.s{background:var(--bg);color:var(--ink)}
.abtn.s:hover{border-color:var(--or);transform:translateY(-2px)}
.name-row{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.name-row input{flex:1;min-width:160px;border:2px solid var(--bd);border-radius:11px;padding:.65rem 1rem;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:600;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s}
.name-row input:focus{border-color:var(--or)}
.name-row input::placeholder{color:#c9b99e;font-weight:400}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <h1>✨ My <span>Story Builder</span></h1>
    <p class="sub">Make 4 choices — then read your very own story!</p>
  </div>
  <div class="steps-row" id="stepsRow"></div>
  <div class="sbar" id="sbar"></div>
  <div id="main"></div>
</div>

<script>
const stories = {

      "Strange creatures peered through the leaves as {name} followed muddy footprints deeper into the jungle. At last, {name} reached a hidden waterfall — and behind it sat a sneaky jungle sprite, clutching the glowing gem. {name} took a deep breath and cast a spectacular rainbow spell, filling the whole cave with dazzling colour.",
      "The sprite blinked in amazement. It had never seen anything so beautiful! Slowly, it held out the gem. {name} smiled and promised to teach the sprite more magic — and the sprite promised never to steal again. The moment {name} returned the gem to its pedestal, every flower in the jungle burst into bloom at once.",
      "That evening, all the jungle animals gathered for the biggest celebration the jungle had ever seen. Parrots sang, monkeys danced, and fireflies lit up the sky like tiny stars. {name} sat in the middle of it all, laughing and munching on the juiciest mango in the whole jungle!"
    ]

  "Wizard|Jungle island|A stolen gem|Making a new friend":{

      "After squeezing through thorny bushes and tiptoeing over a very grumpy crocodile, {name} found the culprit — a small scruffy monkey sitting on a mossy log, hugging the gem tightly. The monkey didn't look sneaky. It looked lonely. {name} sat down quietly beside it.",

    title:"{name} Wakes the Sleeping Jungle",
    body:[
      "A strange enchanted pollen was drifting through the jungle, sending everything it touched into a deep magical sleep. The butterflies, the monkeys, even the trees — all snoring. Only {name} had been flying too fast on a broomstick for the pollen to catch. \"Right,\" said {name}, landing with a thud. \"It's up to me.\"",
      "Following the drifting clouds of pollen, {name} discovered the source — an ancient sneezing flower as big as a house, hiccupping sleep-dust with every sneeze. It wasn't being mean. It had a terrible cold. {name} searched a pile of old scrolls and found a recipe for magical ginger tea.",
      "It took {name} three hours to brew the tea in a giant leaf-bowl. Then {name} carefully poured it into the flower's roots. Slowly, the sneezing stopped. The pollen cleared. One by one, the animals blinked awake — confused, yawning, and covered in leaf-shapes from where they'd fallen.",

  "Wizard|Jungle island|A monster is lost|A funny surprise":{
    title:"{name} and the Very Confused Jungle Monster",
    body:[
      "A distress call echoed through the jungle — a huge green monster had wandered in and was completely lost, crashing through the trees and accidentally sitting on huts. {name}, the most enthusiastic (if slightly clumsy) wizard around, set off immediately. Armed with a spell book that kept blowing open to the wrong page, {name} tripped and stumbled deeper into the jungle.",
      "After accidentally turning three frogs bright pink and making a tree sneeze glitter, {name} found the monster. It was enormous, and it had somehow got a banana tree stuck on its head like a very leafy hat. The monster looked deeply embarrassed.",
      "{name} tried a navigation spell to help the monster find its home — but fumbled the words and turned the monster into a briefly very confused giant tortoise. The spell wore off in seconds. The monster blinked. The banana tree was still on its head.",
      "Eventually {name} walked the monster safely home using a hand-drawn map, three wrong turns, and a great deal of patience. By the time they arrived, the jungle animals were already re-enacting the story of the giant tortoise monster. {name} laughed the loudest of all."

  },
  "Wizard|Outer space|A stolen gem|A big celebration":{
    title:"{name} and the Star Gem of the Galaxy",
    body:[
      "The Star Gem — the most precious jewel in all the galaxy — had been stolen from its display case aboard the Space Station, and without it, every planet in the system began to grow cold. {name} fired up a rocket broomstick and zoomed off into the stars to find it.",
      "The trail of stardust led {name} past sleeping asteroids and through a glittery nebula that smelled of cinnamon. At the edge of the galaxy, {name} found the gem — in the hands of a young alien who had taken it simply because it sparkled, and sparkly things made it happy.",
      "{name} explained very patiently that gems are not for collecting when everyone needs them. The alien looked embarrassed and immediately held it out. {name} thanked it kindly, promised to bring it something sparkly of its own one day, and zoomed the gem home.",
      "Every civilisation in the galaxy threw a party on the same night. {name} was the guest of honour at all of them — which required a great deal of teleporting — and danced in zero gravity until the stars began to dim for morning."

  "Wizard|Outer space|The sun has vanished|Making a new friend":{
    title:"{name} and the Star Collector",
    body:[
      "The galaxy woke up to darkness. The sun had vanished, and every planet sat cold and confused. {name}, a quick-thinking space wizard, fired up a rocket broomstick and followed the faintest trail of warmth across the stars to find it.",
      "After two meteor showers and a rather rude black hole, {name} discovered the sun crammed inside a glass dome on a tiny, lonely planet. Beside it was a small alien with six arms and the saddest expression {name} had ever seen. The alien had taken the sun because its planet had no light and it was terribly lonely.",
      "{name} sat with the alien for a long time. Then {name} cast a special spell — splitting off a small personal star, just bright enough to light one little planet. The alien's eyes filled with happy tears. The sun was released and rolled back into its rightful place across the sky.",
      "Now {name} visits the alien's glowing planet every month. They sit under their little star, share snacks from across the galaxy, and watch the distant suns sparkle. Neither of them is lonely any more."
    ]
  },
  "Wizard|Outer space|Everyone fell asleep|Becoming a hero":{
    title:"The Wizard Who Woke the Galaxy",
    body:[
      "A magical sleep mist was spreading across the galaxy, sending every creature it touched into a deep snoring slumber. Planet by planet, everything went quiet. {name} was the only one left awake, floating alone in the space station. \"Right,\" said {name}. \"It's up to me.\"",
      "Following the mist back to its source meant dodging sleeping space whales, navigating through snoring satellites, and very carefully stepping over an enormous sleeping robot on Planet Krix-9. At the centre of it all was an ancient spell clock — ticking down to zero.",

      "From the smallest moon mouse to the tallest galactic giant, every living thing knew the name {name}. Songs were written, statues were carved, and a whole new constellation was shaped in {name}'s honour — visible from every planet on the clearest nights."
    ]
  },
  "Wizard|Outer space|A monster is lost|A funny surprise":{
    title:"{name} and the Very Lost Space Monster",
    body:[
      "The distress beacon came from near the Rings of Zarblox. {name}, space wizard extraordinaire, steered toward the signal and found something unexpected — a gigantic purple monster floating in space, wrapped in its own tentacles and spinning very slowly. It had a deeply embarrassed look on all four of its faces.",
      "The monster explained (in honks that {name}'s translator struggled with) that it had gotten dizzy in a meteor shower and forgotten which way was home. {name} tried to use the star map — but the monster kept accidentally sitting on it.",
      "After three wrong turns, a trip through a wormhole that deposited them briefly in someone's bathroom on Pluto-Minor, and a very confusing argument with a satellite, {name} finally navigated the monster safely home. The monster's family came rushing out — all forty-seven of them.",

  "Dragon|Magic kingdom|A stolen gem|A big celebration":{
    title:"{name} and the Royal Gem",
    body:[
      "The Royal Gem had been stolen from the castle tower, and every knight had failed to find it. That was when {name} — a small but fiercely determined dragon — volunteered to try. {name} had an excellent nose for sparkly things and followed the trail of glittery footprints straight into the Whispering Forest.",
      "Deep in the forest, {name} found the culprit — not a villain, but a young magpie who had taken the gem because it caught the light beautifully. The magpie hadn't meant any harm. It simply loved shiny things more than anything.",
      "{name} explained gently why the gem was so important to the whole kingdom, and offered to find the magpie something just as beautiful to keep. The magpie handed it over with a small, apologetic chirp. {name} flew it straight back to the castle and placed it in the king's hands.",
      "The kingdom celebrated for three whole days. There were feasts, fireworks, and a parade where {name} flew overhead showering golden sparks across the cheering crowd. It was, everyone agreed, the very best party the kingdom had ever seen!"
    ]
  },
  "Dragon|Magic kingdom|The sun has vanished|Making a new friend":{
    title:"{name} and the Stolen Sunshine",

      "The magic kingdom had gone dark overnight. No warmth, no light, no golden mornings — just cold grey sky. The king called for the bravest dragon in the land, and {name} stepped forward. {name} had always wanted to go on a proper quest.",
      "Flying high above the clouds, {name} followed the last traces of sunlight to a mountain of frozen cloud. There sat a mischievous weather witch, who had bottled the sun to use as a reading lamp because her candles kept blowing out.",
      "{name} didn't breathe fire at the witch. Instead, {name} landed carefully and asked to sit beside her. They talked for a long time. {name} showed her how dragon fire could burn so steadily it would never be blown out. The witch's eyes lit up — she handed over the sun jar immediately.",
      "{name} released the sun back into the sky, and the witch visited the kingdom every week after that. She and {name} would sit together watching sunsets — two unlikely friends who had both been a little lonely before they met."
    ]
  },
  "Dragon|Jungle island|Everyone fell asleep|Becoming a hero":{
    title:"{name} Saves the Sleeping Jungle",
    body:[
      "It started with the butterflies — they folded their wings mid-flutter and drifted to the ground, fast asleep. Then the monkeys, the toucans, the trees themselves. A strange enchanted pollen was drifting through the jungle air. Only {name}, a dragon who breathed through their mouth, was safe. {name} set off to find the source.",
      "Deep in the jungle, the pollen led to an ancient sneezing flower as big as a house, hiccupping clouds of sleep-dust with every sneeze. It had a terrible cold. {name} searched through old jungle scrolls and found a recipe for magical ginger tea — the cure for flower colds.",
      "Three hours of careful fire-brewing later, {name} poured the tea into the flower's roots. The sneezing stopped. The pollen cleared. All across the jungle, animals blinked awake, confused and yawning, covered in the leaf-shapes from where they'd fallen.",
      "When the jungle elder — an enormous ancient tortoise — declared {name} a Jungle Hero, every creature cheered so loudly that fruit fell from every tree. {name} glowed with pride, accidentally lit a small bush on fire (which was quickly put out), and bowed very carefully."

  },
  "Dragon|Underwater city|A monster is lost|A funny surprise":{
    title:"{name} and the Upside-Down Sea Serpent",
    body:[
      "The underwater city of Coralia was in a panic. A gigantic sea serpent had wandered in from the deep ocean and was completely lost, swimming in nervous circles through the market and knocking over stalls with its enormous tail. The mayor begged for help. {name} — a water-breathing dragon with excellent navigation skills — dove straight in.",
      "Finding the serpent was easy. It was the biggest creature in the city, and it was wearing a fruit stall on its head like a very fancy hat. {name} swam up calmly. The serpent, it turned out, had been following what it thought was a map — but which was actually a shopping list someone had dropped in the ocean.",
      "{name} studied the sea-stars and currents, worked out exactly where the serpent's home was, and led it all the way there — the serpent following carefully, still wearing the fruit stall.",
      "Back in Coralia, the mayor declared {name} a hero. Then found a pineapple in the fountain, a bunch of kelp in the library, and a startled lobster on the mayor's own chair. The city laughed about it for years, and whenever anything went missing, someone always said — \"Must have been the serpent.\""

let step=0,ans={},activeRaf=null;

function dots(){
  const r=document.getElementById('stepsRow');r.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===step?' active':i<step?' done':'');
    d.textContent=i<step?'✓':i+1;r.appendChild(d);
    if(i<3){const l=document.createElement('div');l.className='dline'+(i<step?' done':'');r.appendChild(l);}
  }
}

function updateSbar(){
  const b=document.getElementById('sbar');
  const labels={character:'🎭',world:'🌍',problem:'⚡',ending:'🏁'};
  const keys=Object.keys(ans);
  if(!keys.length){b.style.display='none';return;}
  b.style.display='flex';
  b.innerHTML=keys.map(k=>`<div class="chip">${labels[k]} <b>${ans[k]}</b></div>`).join('');
}

function render(){
  dots();updateSbar();
  const s=stepDefs[step];
  document.getElementById('main').innerHTML=`<div class="card">
    <div class="ey">${s.ey}</div>
    <div class="qu">${s.qu}</div>
    <div class="cgrid">
      ${s.choices.map((c,i)=>`<button class="cbtn${ans[s.id]===c.l?' sel':''}" onclick="pick(${i})">
        <span class="ce">${c.e}</span><span class="cl">${c.l}</span>
      </button>`).join('')}
    </div>
    <button class="nbtn" id="nb" onclick="next()" ${!ans[s.id]?'disabled':''}>
      ${step===3?'Build my story! ✨':'Next →'}
    </button>
  </div>`;
}

function pick(i){
  const s=stepDefs[step];
  ans[s.id]=s.choices[i].l;
  document.querySelectorAll('.cbtn').forEach((b,j)=>b.className='cbtn'+(j===i?' sel':''));
  document.getElementById('nb').disabled=false;
}

function next(){
  if(!ans[stepDefs[step].id])return;
  step++;
  if(step>=4){showLoading();}else{render();}
}

function showLoading(){
  dots();updateSbar();
  document.getElementById('main').innerHTML=`
    <div id="readyBanner" class="ready-banner">🎉 Your story is ready! Scroll down to put in your name!</div>
    <div class="gscreen">
      <div class="gtop">
        <div class="gtitle">Building your story<span class="wdots"></span></div>
        <div class="gsub">Play the jumping game while you wait!</div>
      </div>
      <div style="text-align:center;font-family:'Baloo 2',cursive;font-size:.9rem;color:var(--mu);margin-bottom:.45rem">Tap the game or press SPACE to jump!</div>
      <canvas id="gc" style="height:155px"></canvas>
      <div class="gscores">Score: <span id="gs">0</span><span style="opacity:.4">|</span>Best: <span id="gb">0</span></div>
    </div>
    <div id="nameArea" style="display:none">
      <div class="card">
        <div class="ey">Almost there!</div>
        <div class="qu">What is your hero's name?</div>
        <div class="name-row">
          <input type="text" id="heroName" placeholder="Type your name here..." maxlength="20" />
          <button class="nbtn" style="margin-top:0;width:auto;padding:.65rem 1.25rem;white-space:nowrap" onclick="showStory()">Read my story! 📖</button>
        </div>
      </div>
    </div>
    <div id="storyArea"></div>
    <div id="actionArea"></div>
  `;
  setTimeout(()=>startGame(),100);
  setTimeout(()=>{
    document.getElementById('readyBanner').style.display='block';
    document.getElementById('nameArea').style.display='block';
    document.getElementById('readyBanner').scrollIntoView({behavior:'smooth',block:'nearest'});
    const ni=document.getElementById('heroName');
    if(ni)ni.addEventListener('keydown',e=>{if(e.key==='Enter')showStory();});
  },1600);
}

function showStory(){
  const ni=document.getElementById('heroName');
  const name=(ni&&ni.value.trim())||'the hero';
  const key=`${ans.character}|${ans.world}|${ans.problem}|${ans.ending}`;
  const s=stories[key]||Object.values(stories)[0];
  const title=s.title.replace(/\{name\}/g,name);
  const bodyHTML=s.body.map(p=>`<p>${p.replace(/\{name\}/g,`<span class="hi">${name}</span>`)}</p>`).join('');
  document.getElementById('nameArea').style.display='none';
  document.getElementById('readyBanner').style.display='none';
  document.getElementById('storyArea').innerHTML=`
    <div class="story-card">
      <div style="text-align:center;margin-bottom:1.2rem">
        <div class="sbadge">✨ Your story</div>
        <div class="stitle">${title}</div>
        <div class="sauthor">A story by ${name}</div>
      </div>
      <hr class="sdiv">
      <div class="sbody">${bodyHTML}</div>
    </div>`;
  document.getElementById('actionArea').innerHTML=`
    <div class="arow">
      <button class="abtn p" onclick="tryAgain()">✨ Try different choices</button>
      <button class="abtn s" onclick="document.getElementById('storyArea').scrollIntoView({behavior:'smooth'})">📖 Read it again</button>
    </div>`;
  document.getElementById('storyArea').scrollIntoView({behavior:'smooth',block:'start'});
}

function tryAgain(){
  if(activeRaf){cancelAnimationFrame(activeRaf);activeRaf=null;}
  step=0;ans={};
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function startGame(){
  const canvas=document.getElementById('gc');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||660,H=155;
  canvas.width=W;canvas.height=H;
  const GY=H-30;
  let state='idle',score=0,hi=0,spd=5,fr=0,nxt=100;
  const hero={x:50,y:GY,h:32,vy:0,grnd:true,leg:0};
  let obs=[],clouds=[{x:W*.2,y:18},{x:W*.55,y:12},{x:W*.82,y:22}];

  function jump(){if(state==='dead'){restart();return;}if(state==='idle')state='running';if(hero.grnd){hero.vy=-12;hero.grnd=false;}}
  function restart(){state='running';score=0;spd=5;fr=0;nxt=100;hero.y=GY;hero.vy=0;hero.grnd=true;hero.leg=0;obs=[];}
  function spawnObs(){const h=24+Math.random()*20,w=13+Math.random()*9;obs.push({x:W+10,y:GY+hero.h-h,w,h});}

  function drawCloud(x,y){
    ctx.save();ctx.globalAlpha=.7;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.arc(x+14,y-4,15,0,Math.PI*2);ctx.arc(x+29,y,11,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }
  function drawHero(){
    const bx=hero.x,by=hero.y-hero.h;
    ctx.fillStyle='#fff7ed';ctx.fillRect(bx+4,by+15,17,13);
    ctx.fillStyle='#f97316';ctx.fillRect(bx,by+17,5,9);ctx.fillRect(bx+19,by+17,5,9);
    ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(bx+12,by+9,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';
    if(state==='dead'){ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.fillText('x',bx+8,by+12);ctx.fillText('x',bx+16,by+12);}
    else{ctx.fillRect(bx+7,by+6,3,3);ctx.fillRect(bx+15,by+6,3,3);ctx.fillStyle='#fff';ctx.fillRect(bx+8,by+7,1,1);ctx.fillRect(bx+16,by+7,1,1);}
    ctx.fillStyle='#d97706';
    if(hero.grnd&&state==='running'){const lp=Math.sin(hero.leg)*4;ctx.fillRect(bx+4,by+27,7,8+lp);ctx.fillRect(bx+13,by+27,7,8-lp);}
    else{ctx.fillRect(bx+4,by+27,7,10);ctx.fillRect(bx+13,by+27,7,10);}
  }
  function drawCactus(o){
    ctx.fillStyle='#4caf50';ctx.fillRect(o.x+o.w/2-3,o.y,6,o.h);
    ctx.fillStyle='#388e3c';ctx.fillRect(o.x+o.w/2-3,o.y,6,5);
    ctx.fillStyle='#4caf50';
    ctx.fillRect(o.x,o.y+5,o.w/2-3,5);ctx.fillRect(o.x,o.y+1,4,10);
    ctx.fillRect(o.x+o.w/2+3,o.y+7,o.w/2-3,5);ctx.fillRect(o.x+o.w-4,o.y+3,4,10);
  }
  function hit(){for(const o of obs){if(hero.x+18>o.x+3&&hero.x+5<o.x+o.w-3&&hero.y>o.y+4&&hero.y-hero.h<o.y+o.h-4)return true;}return false;}

  function tick(){
    activeRaf=requestAnimationFrame(tick);fr++;
    ctx.fillStyle='#daeef8';ctx.fillRect(0,0,W,H);
    clouds.forEach(c=>{drawCloud(c.x,c.y);if(state==='running')c.x-=.65;if(c.x<-65)c.x=W+35;});
    ctx.fillStyle='#6dbf45';ctx.fillRect(0,GY+hero.h,W,6);
    ctx.fillStyle='#8d6840';ctx.fillRect(0,GY+hero.h+5,W,H);
    ctx.fillStyle='#5aa338';for(let gx=(fr*spd%38);gx<W;gx+=38)ctx.fillRect(gx,GY+hero.h,18,2);
    if(state==='running'){
      score++;if(score%380===0)spd=Math.min(spd+.55,12);
      hero.vy+=.7;hero.y+=hero.vy;
      if(hero.y>=GY){hero.y=GY;hero.vy=0;hero.grnd=true;}
      hero.leg+=.27;nxt--;
      if(nxt<=0){spawnObs();nxt=105+Math.random()*85;}
      obs.forEach(o=>o.x-=spd);obs=obs.filter(o=>o.x>-55);
      if(hit()){state='dead';if(score>hi)hi=score;}
    }
    obs.forEach(o=>drawCactus(o));drawHero();
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.font='bold 12px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.floor(score/10),W-8,18);
    if(state==='idle'||state==='dead'){
      ctx.fillStyle='rgba(0,0,0,.42)';ctx.fillRect(W/2-112,H/2-24,224,48);
      ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
      ctx.fillText(state==='dead'?`Score: ${Math.floor(score/10)}  —  Tap to try again!`:'Tap the game or press SPACE to jump!',W/2,H/2+5);
    }
    const gs=document.getElementById('gs'),gb=document.getElementById('gb');
    if(gs)gs.textContent=Math.floor(score/10);if(gb)gb.textContent=Math.floor(hi/10);
  }
  canvas.addEventListener('click',jump);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
  document.addEventListener('keydown',e=>{if(e.code==='Space'&&document.getElementById('gc')){e.preventDefault();jump();}});
  if(activeRaf)cancelAnimationFrame(activeRaf);
  activeRaf=requestAnimationFrame(tick);
}

render();
</script>
</body>
</html>
