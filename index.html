<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Story Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fdf6ee;--card:#fff;--ink:#2d2013;--mu:#8a7560;--bd:#e8ddd0;--or:#f97316;--pu:#8b5cf6;--gr:#10b981;--selbg:#fff7ed}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
#app{max-width:720px;margin:0 auto;padding:1.75rem 1rem 4rem}
.top{text-align:center;margin-bottom:1.75rem}
h1{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--ink)}
h1 span{color:var(--or)}
.sub{color:var(--mu);font-size:.95rem;margin-top:.3rem}
.steps-row{display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;gap:0}
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--bd);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-weight:700;font-size:.8rem;color:var(--mu);flex-shrink:0;transition:all .3s}
.dot.active{background:var(--or);border-color:var(--or);color:#fff;transform:scale(1.15)}
.dot.done{background:var(--gr);border-color:var(--gr);color:#fff}
.dline{height:2px;width:24px;background:var(--bd);flex-shrink:0;transition:background .3s}
.dline.done{background:var(--gr)}
.sbar{background:var(--card);border:1.5px solid var(--bd);border-radius:12px;padding:.75rem 1.1rem;margin-bottom:1rem;display:none;flex-wrap:wrap;gap:6px}
.chip{background:var(--bg);border:1.5px solid var(--bd);border-radius:50px;padding:3px 11px;font-size:.8rem;font-weight:600;color:var(--mu)}
.chip b{color:var(--ink)}
.card{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:1.6rem;margin-bottom:1rem;animation:pop .38s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 10px rgba(0,0,0,.05)}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ey{font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--or);margin-bottom:.35rem}
.qu{font-family:'Baloo 2',cursive;font-size:1.35rem;font-weight:700;color:var(--ink);margin-bottom:1.1rem;line-height:1.3}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px}
.cbtn{background:var(--bg);border:2px solid var(--bd);border-radius:13px;padding:.85rem .6rem;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .18s;font-family:'Nunito',sans-serif}
.cbtn:hover{border-color:var(--or);transform:translateY(-2px);box-shadow:0 4px 12px rgba(249,115,22,.13)}
.cbtn.sel{background:var(--selbg);border-color:var(--or);box-shadow:0 0 0 3px rgba(249,115,22,.18);transform:translateY(-2px)}
.ce{font-size:1.9rem;line-height:1}
.cl{font-family:'Baloo 2',cursive;font-weight:700;font-size:.87rem;color:var(--ink);line-height:1.2}
.nbtn{display:block;width:100%;margin-top:.9rem;background:var(--or);color:#fff;border:none;border-radius:13px;padding:.9rem;font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(249,115,22,.32)}
.nbtn:hover{background:#ea6c0a;transform:translateY(-2px)}
.nbtn:disabled{background:#d1c4b8;box-shadow:none;cursor:not-allowed;transform:none}
.gscreen{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:1.4rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.gtop{text-align:center;margin-bottom:.8rem}
.gtitle{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;color:var(--ink)}
.gsub{color:var(--mu);font-size:.85rem;margin-top:.15rem}
.wdots::after{content:'';animation:wd 1.5s steps(4,end) infinite}
@keyframes wd{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
#gc{display:block;width:100%;border-radius:12px;border:2px solid var(--bd);cursor:pointer;touch-action:manipulation}
.gscores{display:flex;justify-content:space-between;margin-top:.4rem;font-family:'Baloo 2',cursive;font-size:.88rem;color:var(--mu)}
.gscores span{font-weight:700;color:var(--ink)}
.ready-banner{background:#f0fdf4;border:2px solid #86efac;border-radius:13px;padding:.9rem 1.1rem;text-align:center;margin-bottom:1rem;font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:700;color:#16a34a;display:none;animation:pop .4s ease}
.story-card{background:var(--card);border:1.5px solid var(--bd);border-radius:18px;padding:1.75rem;margin-bottom:1rem;box-shadow:0 2px 14px rgba(0,0,0,.06);animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
.sbadge{display:inline-block;background:#fff7ed;border:1.5px solid #fed7aa;color:var(--or);border-radius:50px;padding:3px 13px;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:.65rem}
.stitle{font-family:'Baloo 2',cursive;font-size:1.65rem;font-weight:800;color:var(--ink);line-height:1.2;margin-bottom:.2rem}
.sauthor{color:var(--mu);font-size:.88rem;margin-bottom:1rem}
.sdiv{border:none;border-top:1.5px solid var(--bd);margin:1rem 0}
.sbody{font-size:1.05rem;line-height:1.9;color:var(--ink)}
.sbody p{margin-bottom:1rem}
.sbody p:last-child{margin-bottom:0}
.hi{font-weight:700;color:var(--pu)}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.5rem}
.abtn{border:2px solid var(--bd);border-radius:13px;padding:.78rem;font-family:'Baloo 2',cursive;font-size:.98rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.abtn.p{background:var(--pu);border-color:var(--pu);color:#fff;box-shadow:0 4px 14px rgba(139,92,246,.28)}
.abtn.p:hover{background:#7c3aed;transform:translateY(-2px)}
.abtn.s{background:var(--bg);color:var(--ink)}
.abtn.s:hover{border-color:var(--or);transform:translateY(-2px)}
.name-row{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.name-row input{flex:1;min-width:160px;border:2px solid var(--bd);border-radius:11px;padding:.65rem 1rem;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:600;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s}
.name-row input:focus{border-color:var(--or)}
.name-row input::placeholder{color:#c9b99e;font-weight:400}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <h1>✨ My <span>Story Builder</span></h1>
    <p class="sub">Make 4 choices — then read your very own story!</p>
  </div>
  <div class="steps-row" id="stepsRow"></div>
  <div class="sbar" id="sbar"></div>
  <div id="main"></div>
</div>

<script>
const stories = {

"Wizard|Jungle island|A stolen gem|A big celebration":{
title:"{name} and the Shiny Gem",
body:[
"One morning, {name} walked into the jungle and found something bad. The magic gem was gone! Someone had taken it from its special spot. Without the gem, the jungle flowers were dying. {name} picked up a big stick and ran into the trees to look for it.",
"Deep in the jungle, {name} found a little sprite sitting by a waterfall. The sprite had the gem in its hands. It was hiding behind a big leaf. {name} took a deep breath and used a rainbow spell. Colours flew all around the cave. It was so pretty!",
"The sprite had never seen anything like it. It smiled and held out the gem. {name} took it back and said thank you. Then {name} put the gem back in its spot. All at once, every flower in the jungle opened up. They were bright red, yellow, and pink.",
"That night, all the animals had a big party. The monkeys danced. The birds sang loud songs. Little bugs lit up the sky like tiny lights. {name} sat in the middle of it all, eating the biggest, sweetest mango ever. What a great day!"
]},

"Wizard|Jungle island|A stolen gem|Making a new friend":{
title:"{name} and the Sad Little Monkey",
body:[
"The magic gem was gone! Without it, the rivers in the jungle had stopped flowing. {name} put on a hat and set off to find it. {name} had a big spell book and a kind heart.",
"After a long walk, {name} found the gem. A small monkey was holding it tight. It was sitting all alone on a log. The monkey did not look mean. It just looked sad. {name} sat down next to it and waited.",
"The monkey made small, sad sounds. It had taken the gem because it glowed in the dark. The monkey was scared of the dark. {name} had a good idea. {name} made a small glowing ball of light, just for the monkey. The monkey's eyes went wide. It gave back the gem right away.",
"After that, {name} and the monkey played together every day. At night, the little light kept the monkey safe and warm. The rivers flowed again. And {name} had made a brand new best friend."
]},

"Wizard|Jungle island|Everyone fell asleep|Becoming a hero":{
title:"{name} Wakes Up the Jungle",
body:[
"A strange yellow dust was floating through the jungle. Every animal it touched fell fast asleep. The birds fell off their branches. The monkeys stopped mid-swing. Even the big old trees seemed to droop. Only {name} was still awake. {name} had been flying on a broomstick and the dust had missed. \"I have to fix this,\" said {name}.",
"The yellow dust led {name} to a huge flower. It was as big as a house! The flower kept sneezing out big puffs of yellow dust. It was not being mean. It just had a cold. {name} looked through an old spell book and found a recipe for magic ginger tea.",
"It took a long time to make the tea. {name} used fire from the wand to heat it up in a big leaf. Then {name} poured the tea onto the flower's roots. The flower stopped sneezing. The yellow dust floated away. One by one, all the animals woke up.",
"The oldest animal in the jungle was a big turtle. He called out, \"{name} is a hero!\" All the animals cheered. Fruit fell from the trees. {name} smiled so much that cheeks hurt. It felt really, really good."
]},

"Wizard|Jungle island|A monster is lost|A funny surprise":{
title:"{name} and the Lost Jungle Monster",
body:[
"A big green monster had walked into the jungle and now it was totally lost. It kept bumping into trees and knocking things over by mistake. The animals were scared. {name} grabbed a spell book and went to help. The book kept blowing open to the wrong page, which did not help at all.",
"On the way, {name} turned three frogs bright pink by mistake and made a tree sneeze glitter. Oops. When {name} finally found the monster, it had a whole banana tree stuck on its head like a big leafy hat. The monster looked very embarrassed.",
"It took a really long time to get the monster home. {name} used a hand-drawn map. They went the wrong way three times. At one point they ended up in a mud swamp. The banana tree was still on the monster's head the whole time.",
"When they finally got there, all the jungle animals were watching. They had seen everything. The animals kept acting out the story of the banana-hat monster over and over again at every party after that. {name} always laughed the loudest."
]},

"Wizard|Outer space|A stolen gem|A big celebration":{
title:"{name} and the Missing Star Gem",
body:[
"The Star Gem had been taken from the space station. Without it, all the planets were getting cold and dark. {name} jumped on a rocket broomstick and flew off into space to find it. The stars twinkled all around as {name} zoomed through the sky.",
"The trail of sparkly dust led to the edge of space. There was a young alien sitting on a small rock. It was holding the gem and smiling. The alien had taken it because it was shiny, and shiny things made it happy. It had not meant to cause any trouble.",
"\"The gem belongs to everyone,\" said {name} kindly. The alien looked down. Then it held out the gem. {name} said thank you and promised to bring the alien something sparkly of its very own one day. The alien waved as {name} flew away.",
"That night, every planet in space had a party at the same time. There was music and dancing and lots of food. {name} was the special guest at all of them. Luckily, wizards are very good at being in two places at once!"
]},

"Wizard|Outer space|The sun has vanished|Making a new friend":{
title:"{name} and the Lonely Alien",
body:[
"One morning, the sun was gone. Every planet went dark and cold. {name} got on a rocket broomstick and flew off to look for it. The sky was black all around. It felt strange flying without any sunshine.",
"After a long flight, {name} saw a tiny glow far away. On a small, dark planet, the sun had been put inside a big glass jar. Next to it sat a little alien with six arms. It looked very sad. It had taken the sun because its planet had no light and it felt very alone.",
"{name} sat with the alien and listened. Then {name} did something kind. {name} made a small star — just small enough to light up one little planet. The alien looked at it and smiled. Its eyes filled with happy tears. It gave the sun back straight away.",
"Now {name} visits the alien every month. They sit together under the little star and eat space snacks. They look at the other stars far away. Neither of them feels lonely any more."
]},

"Wizard|Outer space|Everyone fell asleep|Becoming a hero":{
title:"{name} Saves the Sleeping Galaxy",
body:[
"A strange sleepy mist was spreading through space. Every person and creature it touched fell fast asleep. Planet by planet, everything went quiet. {name} was the only one still awake. {name} had been flying too fast for the mist to catch. \"It is up to me,\" said {name}.",
"Finding the mist was hard. There were sleeping space whales floating across the path. There were snoring satellites everywhere. On one planet, {name} had to step over a very big sleeping robot. At last, {name} found an old magic clock that was making the mist. It was counting down to zero.",
"{name} looked at the clock and read every page of the spell book. With just ten seconds left, {name} found the right spell and stopped the clock. A big wave of golden light flew out across space. Everyone woke up.",
"Every creature in space now knew the name {name}. Songs were written about what {name} had done. A new star pattern was made in the sky in the shape of {name}. On clear nights, you can still see it."
]},

"Wizard|Outer space|A monster is lost|A funny surprise":{
title:"{name} and the Spinning Space Monster",
body:[
"A big purple monster was floating lost in space. It had got dizzy playing in a group of flying rocks and now it had no idea where home was. It was spinning slowly and looked very silly. {name} flew over to help.",
"The monster tried to explain where it lived, but kept sitting on the star map by mistake. {name} tried a direction spell, but got the words wrong and they both ended up flying through a strange hole in space. They came out the other side in someone's bathroom on a faraway planet. That was a big surprise for everyone.",
"After three wrong turns and one very confusing chat with a broken satellite, {name} finally worked out where the monster lived. {name} flew it all the way there. The monster's whole family came rushing out when they saw it. There were lots of them!",
"They threw a surprise party for {name} on the spot, right there in space. It was very loud. Someone sat on the rocket broomstick by mistake. {name} laughed so hard the space helmet fogged up. Best day ever."
]},

"Dragon|Magic kingdom|A stolen gem|A big celebration":{
title:"{name} Finds the Royal Gem",
body:[
"The Royal Gem had been taken from the castle. Every knight had tried to find it and failed. Then {name} the dragon stepped forward. {name} had a very good nose for sparkly things. {name} sniffed the air and followed a trail of sparkly footprints into the forest.",
"Deep in the trees, {name} found the gem. A small bird called a magpie had taken it. The magpie loved shiny things more than anything in the world. It had not meant to cause trouble. {name} sat down and explained why the gem was so important to the whole kingdom.",
"The magpie looked sad. Then it gave the gem back with a small chirping sound. {name} promised to find it something just as shiny to keep. Then {name} flew straight back to the castle and put the gem into the king's hands.",
"The whole kingdom had a big party that lasted three days. There was lots of food and music. {name} flew above the crowd and sent golden sparks raining down. Everyone cheered and pointed up. It was the best party the kingdom had ever seen."
]},

"Dragon|Magic kingdom|The sun has vanished|Making a new friend":{
title:"{name} and the Bottled Sunshine",
body:[
"One morning the magic kingdom woke up in the dark. The sun was gone. It was cold and grey everywhere. The king asked for the bravest dragon to help. {name} stepped forward, spread big wings, and flew up into the sky to look.",
"High above the clouds, {name} found a witch sitting on a mountain of frozen cloud. The witch had put the sun inside a big glass jar to use as a reading light. Her candles kept blowing out in the wind. She had not thought about what it would do to the whole kingdom.",
"{name} did not roar or breathe fire. Instead, {name} landed softly and sat down next to her. They had a long talk. {name} showed her how dragon fire can burn without going out, even in the wind. The witch's face lit up. She handed over the jar right away.",
"The sun burst out of the jar and the kingdom went warm and bright again. The witch came to visit every week after that. She and {name} would sit and watch the sunsets together. They became really good friends."
]},

"Dragon|Jungle island|Everyone fell asleep|Becoming a hero":{
title:"{name} the Jungle Hero",
body:[
"A strange yellow dust was floating through the jungle. Every animal it touched fell asleep. The butterflies dropped from the air. The monkeys stopped mid-jump. Even the trees drooped. Only {name} was safe — dragons breathe through their mouths, not their noses. {name} set off to find out what was going on.",
"The yellow dust came from a huge flower deep in the jungle. It was sneezing big puffs of dust over and over again. The flower had a bad cold. {name} found an old jungle recipe for magic ginger tea. It was the cure for sick flowers.",
"It took three hours to make the tea using dragon fire to heat a big leaf full of water. Then {name} poured it onto the flower's roots. The sneezing stopped. The dust blew away. All over the jungle, animals woke up, yawning and looking confused.",
"The oldest animal in the jungle was a huge old turtle. He called out in a loud voice, \"{name} is a hero of the jungle!\" Every animal cheered. Fruit fell out of the trees. {name} smiled so wide that a small bit of fire came out by accident. But no one minded."
]},

"Dragon|Underwater city|A monster is lost|A funny surprise":{
title:"{name} and the Sea Monster with a Hat",
body:[
"A huge sea monster had swum into the underwater city and now it was lost. It kept bumping into things and knocking over market stalls with its big tail. The people of the city were scared. {name}, a dragon who could breathe underwater, swam in to help.",
"Finding the monster was easy. It was the biggest thing in the whole city. It had knocked a fruit stall into the water and the stall was now stuck on its head like a very odd hat. The monster looked embarrassed. It did not mean to cause trouble.",
"The monster had been following what it thought was a map. But it was actually a shopping list someone had dropped in the ocean. {name} worked out where the monster's home was and swam alongside it all the way there. The fruit stall stayed on its head the entire time.",
"Back in the city, the mayor said {name} was a hero. Then they found a pineapple in the fountain. And some seaweed in the library. And a very confused crab sitting on the mayor's chair. Everyone laughed about it for years. Whenever anything went missing, someone would say — \"Must have been the sea monster!\""
]},

"Fairy|Magic kingdom|Everyone fell asleep|A big celebration":{
title:"{name} and the Magic Music Box",
body:[
"The magic kingdom was very, very quiet. Everyone was asleep! The baker had fallen face-first into some bread. The guards were snoring at the castle gate. Even the king was fast asleep on his throne with his crown over one eye. Only {name} the fairy was still awake, because {name} had been flying too fast for the sleeping spell to catch.",
"The spell had come from an old music box in the castle attic. Someone had wound it up by mistake and it was playing a sleepy song over and over. {name} needed to stop it. But the switch to turn it off was too high up. And {name} was very small.",
"{name} had a good idea. {name} found some fluffy dandelion seeds and tied them into a little rope. Then {name} looped the rope around the switch and pulled as hard as possible. Click! The music box stopped. A warm golden light washed over the whole kingdom. Everyone woke up at the same time.",
"Nobody could remember why they had been asleep. But when they found out that {name} had saved them all, the whole kingdom had a big party. It lasted three whole days. {name} danced the most out of everyone, zooming around the lanterns as the fireworks lit up the sky."
]},

"Fairy|Underwater city|A stolen gem|Becoming a hero":{
title:"{name} and the Great Pearl",
body:[
"The Great Pearl had been taken from the underwater city of Coralia. Without it, all the city's lights were going dim. Everyone was scared. {name} was a small fairy who had just found out she could breathe underwater — which was very useful! She flapped her wings and swam down into the dark ocean.",
"The trail of tiny glowing bits led to a dark cave. It was full of twisting paths and shadows. {name} was a bit scared. But someone had to go in. So {name} held up her wand like a torch and went inside, one step at a time.",
"At the end of the cave, {name} found the pearl. Next to it was a very old, very blind octopus. He had been sitting on the pearl for thirty years because he thought it was an egg. {name} sat with him and gently explained the mix-up. Then {name} gave him a big hug and carried the pearl back to the city.",
"When {name} put the pearl back in its spot, all the lights in Coralia blazed back on. The people swam in happy circles. The mayor put a tiny crown made of coral on {name}'s head. \"You are the greatest hero this city has ever had,\" she said. And {name} beamed with pride all the way home."
]},

"Robot|Outer space|A monster is lost|A big celebration":{
title:"{name} and the Lost Space Monster",
body:[
"One day, {name} the robot was flying between planets when a message came through. A huge purple space monster was lost and all alone in a field of floating rocks. It was sending out a help signal. {name} flew straight over to find it.",
"The monster was much bigger than {name}'s ship. But it had curled itself up small and was trying not to take up too much space. It looked very sad. {name} opened a speaker and made a friendly beeping sound. The monster beeped back. They did not speak the same language, but somehow they understood each other.",
"It took seventeen star maps and one clever shortcut to find the monster's family. They were waiting near two big moons far away. {name} flew slowly and the monster followed. It took a long time, but they got there in the end.",
"When the monster saw its family, it made a sound like a hundred foghorns all at once. The whole family wrapped their long arms around each other. Then one long arm came down and wrapped gently around {name}'s ship too. That night the family danced around the moons. {name} watched every single bit of it."
]},

"Robot|Underwater city|The sun has vanished|A funny surprise":{
title:"{name} and the Sun at the Bottom of the Sea",
body:[
"The sun was gone. Everything was dark and cold. {name} was a waterproof robot, which was very lucky. {name} dived straight into the ocean to look for it. The satellites had tracked the sun to somewhere very deep and very strange.",
"Down, down, down went {name}. Then — a warm orange glow. At the very bottom of the ocean, the sun was sitting on the sand. It looked confused. It also looked a little wet. It had rolled in through an underwater volcano and could not get back out.",
"{name} made a plan. First, {name} found some very long anchor chains. Then {name} made a slide out of seaweed. Then {name} asked a very large whale for help. It took ages and there were two mistakes and one very shocked crab. But slowly, the sun floated back up through the water and popped back into the sky.",
"It turned out the sun had just slipped. It had never happened before. The sun did not want to talk about it at all. But {name} became famous across space as the robot who used a whale to put the sun back. Every time someone told the story, it got a little bit sillier. {name} loved that."
]}

};

const stepDefs=[
  {id:'character',ey:'Step 1 of 4',qu:'What kind of hero are you?',choices:[
    {e:'🧙',l:'Wizard'},{e:'🤖',l:'Robot'},{e:'🐉',l:'Dragon'},{e:'🧚',l:'Fairy'}
  ]},
  {id:'world',ey:'Step 2 of 4',qu:'Where does the adventure happen?',choices:[
    {e:'🌴',l:'Jungle island'},{e:'🚀',l:'Outer space'},{e:'🏰',l:'Magic kingdom'},{e:'🌊',l:'Underwater city'}
  ]},
  {id:'problem',ey:'Step 3 of 4',qu:'What is the big problem to solve?',choices:[
    {e:'💎',l:'A stolen gem'},{e:'🌑',l:'The sun has vanished'},{e:'😴',l:'Everyone fell asleep'},{e:'👾',l:'A monster is lost'}
  ]},
  {id:'ending',ey:'Step 4 of 4',qu:'How does your story end?',choices:[
    {e:'🎉',l:'A big celebration'},{e:'🤝',l:'Making a new friend'},{e:'🌟',l:'Becoming a hero'},{e:'😂',l:'A funny surprise'}
  ]}
];

let step=0,ans={},activeRaf=null;

function dots(){
  const r=document.getElementById('stepsRow');r.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===step?' active':i<step?' done':'');
    d.textContent=i<step?'✓':i+1;r.appendChild(d);
    if(i<3){const l=document.createElement('div');l.className='dline'+(i<step?' done':'');r.appendChild(l);}
  }
}

function updateSbar(){
  const b=document.getElementById('sbar');
  const labels={character:'🎭',world:'🌍',problem:'⚡',ending:'🏁'};
  const keys=Object.keys(ans);
  if(!keys.length){b.style.display='none';return;}
  b.style.display='flex';
  b.innerHTML=keys.map(k=>`<div class="chip">${labels[k]} <b>${ans[k]}</b></div>`).join('');
}

function render(){
  dots();updateSbar();
  const s=stepDefs[step];
  document.getElementById('main').innerHTML=`<div class="card">
    <div class="ey">${s.ey}</div>
    <div class="qu">${s.qu}</div>
    <div class="cgrid">
      ${s.choices.map((c,i)=>`<button class="cbtn${ans[s.id]===c.l?' sel':''}" onclick="pick(${i})">
        <span class="ce">${c.e}</span><span class="cl">${c.l}</span>
      </button>`).join('')}
    </div>
    <button class="nbtn" id="nb" onclick="next()" ${!ans[s.id]?'disabled':''}>
      ${step===3?'Build my story! ✨':'Next →'}
    </button>
  </div>`;
}

function pick(i){
  const s=stepDefs[step];
  ans[s.id]=s.choices[i].l;
  document.querySelectorAll('.cbtn').forEach((b,j)=>b.className='cbtn'+(j===i?' sel':''));
  document.getElementById('nb').disabled=false;
}

function next(){
  if(!ans[stepDefs[step].id])return;
  step++;
  if(step>=4){showLoading();}else{render();}
}

function showLoading(){
  dots();updateSbar();
  document.getElementById('main').innerHTML=`
    <div id="readyBanner" class="ready-banner">🎉 Your story is ready! Scroll down to put in your name!</div>
    <div class="gscreen">
      <div class="gtop">
        <div class="gtitle">Building your story<span class="wdots"></span></div>
        <div class="gsub">Play the jumping game while you wait!</div>
      </div>
      <div style="text-align:center;font-family:'Baloo 2',cursive;font-size:.9rem;color:var(--mu);margin-bottom:.45rem">Tap the game or press SPACE to jump!</div>
      <canvas id="gc" style="height:155px"></canvas>
      <div class="gscores">Score: <span id="gs">0</span>&nbsp;&nbsp;Best: <span id="gb">0</span></div>
    </div>
    <div id="nameArea" style="display:none">
      <div class="card">
        <div class="ey">Almost there!</div>
        <div class="qu">What is your hero's name?</div>
        <div class="name-row">
          <input type="text" id="heroName" placeholder="Type your name here..." maxlength="20" />
          <button class="nbtn" style="margin-top:0;width:auto;padding:.65rem 1.25rem;white-space:nowrap" onclick="showStory()">Read my story! 📖</button>
        </div>
      </div>
    </div>
    <div id="storyArea"></div>
    <div id="actionArea"></div>
  `;
  setTimeout(()=>startGame(),100);
  setTimeout(()=>{
    document.getElementById('readyBanner').style.display='block';
    document.getElementById('nameArea').style.display='block';
    document.getElementById('readyBanner').scrollIntoView({behavior:'smooth',block:'nearest'});
    const ni=document.getElementById('heroName');
    if(ni)ni.addEventListener('keydown',e=>{if(e.key==='Enter')showStory();});
  },1600);
}

function showStory(){
  const ni=document.getElementById('heroName');
  const name=(ni&&ni.value.trim())||'the hero';
  const key=`${ans.character}|${ans.world}|${ans.problem}|${ans.ending}`;
  const s=stories[key]||Object.values(stories)[0];
  const title=s.title.replace(/\{name\}/g,name);
  const bodyHTML=s.body.map(p=>`<p>${p.replace(/\{name\}/g,`<span class="hi">${name}</span>`)}</p>`).join('');
  document.getElementById('nameArea').style.display='none';
  document.getElementById('readyBanner').style.display='none';
  document.getElementById('storyArea').innerHTML=`
    <div class="story-card">
      <div style="text-align:center;margin-bottom:1.2rem">
        <div class="sbadge">✨ Your story</div>
        <div class="stitle">${title}</div>
        <div class="sauthor">A story by ${name}</div>
      </div>
      <hr class="sdiv">
      <div class="sbody">${bodyHTML}</div>
    </div>`;
  document.getElementById('actionArea').innerHTML=`
    <div class="arow">
      <button class="abtn p" onclick="tryAgain()">✨ Try different choices</button>
      <button class="abtn s" onclick="document.getElementById('storyArea').scrollIntoView({behavior:'smooth'})">📖 Read it again</button>
    </div>`;
  document.getElementById('storyArea').scrollIntoView({behavior:'smooth',block:'start'});
}

function tryAgain(){
  if(activeRaf){cancelAnimationFrame(activeRaf);activeRaf=null;}
  step=0;ans={};
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function startGame(){
  const canvas=document.getElementById('gc');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||660,H=155;
  canvas.width=W;canvas.height=H;
  const GY=H-30;
  let state='idle',score=0,hi=0,spd=5,fr=0,nxt=100;
  const hero={x:50,y:GY,h:32,vy:0,grnd:true,leg:0};
  let obs=[],clouds=[{x:W*.2,y:18},{x:W*.55,y:12},{x:W*.82,y:22}];

  function jump(){if(state==='dead'){restart();return;}if(state==='idle')state='running';if(hero.grnd){hero.vy=-12;hero.grnd=false;}}
  function restart(){state='running';score=0;spd=5;fr=0;nxt=100;hero.y=GY;hero.vy=0;hero.grnd=true;hero.leg=0;obs=[];}
  function spawnObs(){const h=24+Math.random()*20,w=13+Math.random()*9;obs.push({x:W+10,y:GY+hero.h-h,w,h});}

  function drawCloud(x,y){
    ctx.save();ctx.globalAlpha=.7;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.arc(x+14,y-4,15,0,Math.PI*2);ctx.arc(x+29,y,11,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }
  function drawHero(){
    const bx=hero.x,by=hero.y-hero.h;
    ctx.fillStyle='#fff7ed';ctx.fillRect(bx+4,by+15,17,13);
    ctx.fillStyle='#f97316';ctx.fillRect(bx,by+17,5,9);ctx.fillRect(bx+19,by+17,5,9);
    ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(bx+12,by+9,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';
    if(state==='dead'){ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.fillText('x',bx+8,by+12);ctx.fillText('x',bx+16,by+12);}
    else{ctx.fillRect(bx+7,by+6,3,3);ctx.fillRect(bx+15,by+6,3,3);ctx.fillStyle='#fff';ctx.fillRect(bx+8,by+7,1,1);ctx.fillRect(bx+16,by+7,1,1);}
    ctx.fillStyle='#d97706';
    if(hero.grnd&&state==='running'){const lp=Math.sin(hero.leg)*4;ctx.fillRect(bx+4,by+27,7,8+lp);ctx.fillRect(bx+13,by+27,7,8-lp);}
    else{ctx.fillRect(bx+4,by+27,7,10);ctx.fillRect(bx+13,by+27,7,10);}
  }
  function drawCactus(o){
    ctx.fillStyle='#4caf50';ctx.fillRect(o.x+o.w/2-3,o.y,6,o.h);
    ctx.fillStyle='#388e3c';ctx.fillRect(o.x+o.w/2-3,o.y,6,5);
    ctx.fillStyle='#4caf50';
    ctx.fillRect(o.x,o.y+5,o.w/2-3,5);ctx.fillRect(o.x,o.y+1,4,10);
    ctx.fillRect(o.x+o.w/2+3,o.y+7,o.w/2-3,5);ctx.fillRect(o.x+o.w-4,o.y+3,4,10);
  }
  function hit(){for(const o of obs){if(hero.x+18>o.x+3&&hero.x+5<o.x+o.w-3&&hero.y>o.y+4&&hero.y-hero.h<o.y+o.h-4)return true;}return false;}

  function tick(){
    activeRaf=requestAnimationFrame(tick);fr++;
    ctx.fillStyle='#daeef8';ctx.fillRect(0,0,W,H);
    clouds.forEach(c=>{drawCloud(c.x,c.y);if(state==='running')c.x-=.65;if(c.x<-65)c.x=W+35;});
    ctx.fillStyle='#6dbf45';ctx.fillRect(0,GY+hero.h,W,6);
    ctx.fillStyle='#8d6840';ctx.fillRect(0,GY+hero.h+5,W,H);
    ctx.fillStyle='#5aa338';for(let gx=(fr*spd%38);gx<W;gx+=38)ctx.fillRect(gx,GY+hero.h,18,2);
    if(state==='running'){
      score++;if(score%380===0)spd=Math.min(spd+.55,12);
      hero.vy+=.7;hero.y+=hero.vy;
      if(hero.y>=GY){hero.y=GY;hero.vy=0;hero.grnd=true;}
      hero.leg+=.27;nxt--;
      if(nxt<=0){spawnObs();nxt=105+Math.random()*85;}
      obs.forEach(o=>o.x-=spd);obs=obs.filter(o=>o.x>-55);
      if(hit()){state='dead';if(score>hi)hi=score;}
    }
    obs.forEach(o=>drawCactus(o));drawHero();
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.font='bold 12px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.floor(score/10),W-8,18);
    if(state==='idle'||state==='dead'){
      ctx.fillStyle='rgba(0,0,0,.42)';ctx.fillRect(W/2-112,H/2-24,224,48);
      ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
      ctx.fillText(state==='dead'?`Score: ${Math.floor(score/10)}  —  Tap to try again!`:'Tap the game or press SPACE to jump!',W/2,H/2+5);
    }
    const gs=document.getElementById('gs'),gb=document.getElementById('gb');
    if(gs)gs.textContent=Math.floor(score/10);if(gb)gb.textContent=Math.floor(hi/10);
  }
  canvas.addEventListener('click',jump);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
  document.addEventListener('keydown',e=>{if(e.code==='Space'&&document.getElementById('gc')){e.preventDefault();jump();}});
  if(activeRaf)cancelAnimationFrame(activeRaf);
  activeRaf=requestAnimationFrame(tick);
}

render();
</script>
</body>
</html>
